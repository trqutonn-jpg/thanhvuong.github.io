<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác minh xóa chủ đề</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="verify-delete-topic">
  <main class="confirm-box">
    <h2>Xác minh xóa chủ đề</h2>
    <p>Chủ đề: <strong data-delete-topic-name></strong></p>
    <p class="error" data-form-message></p>

    <form data-verify-delete-form>
      <label for="delete-password">Nhập mật khẩu để xóa:</label>
      <input id="delete-password" type="password" name="password" placeholder="Mật khẩu..." required>

      <div class="confirm-actions">
        <button type="submit" class="btn-danger">Xác minh & Xóa</button>
        <a href="setting_admin.html" class="btn-cancel">Hủy</a>
      </div>
    </form>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
