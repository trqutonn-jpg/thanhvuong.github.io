<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - VocabularyLearning</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="register">
  <header>
    <a class="logo" href="index.html">📚 MyTopic</a>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="gioithieu.html">Giới thiệu</a>
      <a href="mailto:support@vocabularylearning.com">Liên hệ</a>
    </nav>
  </header>

  <main class="form-container">
    <h2>Đăng ký tài khoản</h2>
    <p class="form-message" data-form-message></p>

    <form data-register-form>
      <label for="name">Họ tên</label>
      <input id="name" type="text" name="name" placeholder="Nhập họ tên..." required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="Nhập email..." required>

      <label for="password">Mật khẩu</label>
      <input id="password" type="password" name="password" placeholder="Nhập mật khẩu..." required>

      <button type="submit" class="btn-main">Đăng ký</button>
    </form>

    <p>Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a></p>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
